{% extends "public_portal_base.html" %}

{% block title %}Thank you | MoneyPro{% endblock %}

{% block content %}
<div class="mx-auto" style="max-width: 760px;">
  <div class="card shadow-sm border-0 rounded-4 p-4 p-md-5 text-center">
    <div class="mb-3"><i class="fa-solid fa-circle-check fa-3x text-success"></i></div>
    <h1 class="h4">Thank you!</h1>
    <p class="text-muted mb-3">Your W-9 information has been received and queued for review.</p>
    <div class="text-muted small">
      Submission recorded: {{ submission.submitted_at|default:"Just now" }}
    </div>
  </div>
</div>
{% endblock %}
