{% extends "index.html" %}
{% block title %}Help | MoneyPro{% endblock %}

{% block content %}
<div class="container-fluid px-2 px-md-3 py-3">

  <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-2 mb-3">
    <div>
      <h1 class="h2 mb-0 text-secondary-brand">Help</h1>
      <div class="text-muted small">Guided workflows and setup checklists</div>
    </div>
  </div>

  <div class="row g-3">
    {% for c in cards %}
      <div class="col-12 col-md-6">
        <a class="text-decoration-none" href="{% url c.url_name %}">
          <div class="card h-100">
            <div class="card-body p-3 p-md-4">
              <div class="d-flex justify-content-between align-items-start gap-3">
                <div>
                  <h2 class="h5 mb-1">{{ c.title }}</h2>
                  <div class="text-muted small">{{ c.subtitle }}</div>
                </div>
                <div class="kpi-icon" aria-hidden="true">
                  <i class="fa-solid {{ c.icon }}"></i>
                </div>
              </div>
              <div class="mt-3 small text-decoration-none">
                Open <i class="fa-solid fa-arrow-right-long ms-1"></i>
              </div>
            </div>
          </div>
        </a>
      </div>
    {% endfor %}
  </div>

</div>
{% endblock %}
