{% extends "index.html" %}

{% block title %}Delete Asset | MoneyPro{% endblock %}

{% block content %}
<div class="container-fluid px-2 px-md-3 py-3">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h1 class="h4 mb-0 text-danger-brand">Delete asset</h1>
      <div class="text-muted small">This cannot be undone.</div>
    </div>
    <a class="btn btn-outline-secondary" href="{% url 'assets:asset_detail' object.pk %}">Back</a>
  </div>

  <div class="card shadow-sm border-0 rounded-4">
    <div class="card-body p-3 p-md-4">
      <p class="mb-3">Are you sure you want to delete <span class="fw-semibold">{{ object.name }}</span>?</p>

      <form method="post">
        {% csrf_token %}
        <div class="d-flex flex-column flex-sm-row justify-content-end gap-2">
          <a class="btn btn-outline-secondary" href="{% url 'assets:asset_detail' object.pk %}">Cancel</a>
          <button class="btn btn-danger" type="submit">
            <i class="fa-solid fa-trash me-1"></i> Delete
          </button>
        </div>
      </form>
    </div>
  </div>

</div>
{% endblock %}
