{% extends "account/base.html" %}
{% load crispy_forms_tags %}

{% block account_content %}
  <h1 class="h4 mb-1 text-center fw-bold">Welcome Back</h1>
  <p class="text-muted small text-center mb-4">Sign in to access your 12Bytes Suites</p>

  <form method="post" novalidate class="auth-form">
    {% csrf_token %}
    {{ form|crispy }}

    <button type="submit" class="btn btn-primary w-100 mt-2">
      <i class="fa-solid fa-lock me-1"></i> Sign In
    </button>
  </form>

  <div class="text-center mt-3">
    <a class="small" href="{% url 'account_reset_password' %}">Forgot your password?</a>
  </div>
{% endblock %}
